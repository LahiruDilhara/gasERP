services:
  postgres:
    image: postgres:alpine
    container_name: gaserp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gaserp
      POSTGRES_USER: gaserp
      POSTGRES_PASSWORD: gaserp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaserp -d gaserp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
